<!-- 可拖动的浮动AI助手组件 -->
<style>
/* 浮动按钮样式 */
.ai-float-button {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #13c8ec 0%, #0fa8c9 100%);
    box-shadow: 0 4px 20px rgba(19, 200, 236, 0.4);
    cursor: move;
    z-index: 9998;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    user-select: none;
}

.ai-float-button:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 30px rgba(19, 200, 236, 0.6);
}

.ai-float-button.dragging {
    cursor: grabbing;
    opacity: 0.8;
}

.ai-float-button .icon {
    font-size: 28px;
    color: white;
}

/* 聊天窗口样式 */
.ai-chat-window {
    position: fixed;
    bottom: 100px;
    right: 30px;
    width: 400px;
    height: 600px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: all 0.3s ease;
}

.dark .ai-chat-window {
    background: #1a3035;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
}

.ai-chat-window.minimized {
    height: 60px;
}

/* 聊天窗口头部 */
.ai-chat-header {
    padding: 16px 20px;
    background: linear-gradient(135deg, #13c8ec 0%, #0fa8c9 100%);
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: move;
    user-select: none;
}

.ai-chat-header .title {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
}

.ai-chat-header .actions {
    display: flex;
    gap: 8px;
}

.ai-chat-header .action-btn {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
}

.ai-chat-header .action-btn:hover {
    background: rgba(255, 255, 255, 0.3);
}

/* 聊天消息区域 */
.ai-chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background: #f9fafb;
}

.dark .ai-chat-messages {
    background: #16282b;
}

.ai-message {
    margin-bottom: 16px;
    display: flex;
    gap: 12px;
    animation: slideIn 0.3s ease;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.ai-message.user {
    flex-direction: row-reverse;
}

.ai-message .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #13c8ec;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
    flex-shrink: 0;
}

.ai-message.user .avatar {
    background: #8b5cf6;
}

.ai-message .content {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 12px;
    background: white;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    word-wrap: break-word;
}

.dark .ai-message .content {
    background: #1a3035;
    color: #e5e7eb;
}

.ai-message.user .content {
    background: #13c8ec;
    color: white;
}

.ai-message .time {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 4px;
}

/* 快捷建议 */
.ai-suggestions {
    padding: 12px 20px;
    background: white;
    border-top: 1px solid #e5e7eb;
    display: flex;
    gap: 8px;
    overflow-x: auto;
}

.dark .ai-suggestions {
    background: #1a3035;
    border-top-color: #325e67;
}

.ai-suggestions::-webkit-scrollbar {
    height: 4px;
}

.ai-suggestion-btn {
    padding: 6px 12px;
    background: #f3f4f6;
    border-radius: 16px;
    font-size: 12px;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.2s;
}

.dark .ai-suggestion-btn {
    background: #192f33;
    color: #a0c4cc;
}

.ai-suggestion-btn:hover {
    background: #13c8ec;
    color: white;
}

/* 输入区域 */
.ai-chat-input {
    padding: 16px 20px;
    background: white;
    border-top: 1px solid #e5e7eb;
    display: flex;
    gap: 12px;
    align-items: center;
}

.dark .ai-chat-input {
    background: #1a3035;
    border-top-color: #325e67;
}

.ai-chat-input input {
    flex: 1;
    padding: 10px 16px;
    border: 1px solid #e5e7eb;
    border-radius: 20px;
    outline: none;
    font-size: 14px;
    background: #f9fafb;
}

.dark .ai-chat-input input {
    background: #16282b;
    border-color: #325e67;
    color: white;
}

.ai-chat-input input:focus {
    border-color: #13c8ec;
}

.ai-chat-input button {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #13c8ec;
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.ai-chat-input button:hover {
    background: #0fa8c9;
    transform: scale(1.05);
}

.ai-chat-input button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* 加载动画 */
.ai-typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
}

.ai-typing span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #13c8ec;
    animation: typing 1.4s infinite;
}

.ai-typing span:nth-child(2) {
    animation-delay: 0.2s;
}

.ai-typing span:nth-child(3) {
    animation-delay: 0.4s;
}

@keyframes typing {
    0%, 60%, 100% {
        transform: translateY(0);
    }
    30% {
        transform: translateY(-10px);
    }
}

/* 响应式 */
@media (max-width: 768px) {
    .ai-chat-window {
        width: calc(100vw - 40px);
        height: calc(100vh - 140px);
        right: 20px;
        bottom: 90px;
    }
}
</style>

<!-- 浮动按钮 -->
<div id="aiFloatButton" class="ai-float-button" @mousedown="startDrag" @click="toggleChat">
    <span class="material-symbols-outlined icon">smart_toy</span>
</div>

<!-- 聊天窗口 -->
<div v-if="showChat" class="ai-chat-window" :class="{ minimized: isMinimized }">
    <!-- 头部 -->
    <div class="ai-chat-header" @mousedown="startDragWindow">
        <div class="title">
            <span class="material-symbols-outlined">smart_toy</span>
            <span>AI 智能助手</span>
        </div>
        <div class="actions">
            <div class="action-btn" @click.stop="isMinimized = !isMinimized">
                <span class="material-symbols-outlined" style="font-size: 18px;">
                    {{ isMinimized ? 'expand_more' : 'remove' }}
                </span>
            </div>
            <div class="action-btn" @click.stop="closeChat">
                <span class="material-symbols-outlined" style="font-size: 18px;">close</span>
            </div>
        </div>
    </div>
    
    <!-- 消息区域 -->
    <div v-show="!isMinimized" class="ai-chat-messages" ref="messagesContainer">
        <!-- 欢迎消息 -->
        <div v-if="messages.length === 0" class="ai-message">
            <div class="avatar">
                <span class="material-symbols-outlined">smart_toy</span>
            </div>
            <div class="content">
                <div>你好！我是AI智能助手，可以帮你分析商品数据、推荐热门商品。有什么我可以帮你的吗？</div>
            </div>
        </div>
        
        <!-- 聊天消息 -->
        <div v-for="(msg, index) in messages" :key="index" class="ai-message" :class="msg.role">
            <div class="avatar">
                <span class="material-symbols-outlined">
                    {{ msg.role === 'user' ? 'person' : 'smart_toy' }}
                </span>
            </div>
            <div>
                <div class="content" v-html="formatMessage(msg.content)"></div>
                <div class="time">{{ formatTime(msg.time) }}</div>
            </div>
        </div>
        
        <!-- 加载中 -->
        <div v-if="isLoading" class="ai-message">
            <div class="avatar">
                <span class="material-symbols-outlined">smart_toy</span>
            </div>
            <div class="content">
                <div class="ai-typing">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 快捷建议 -->
    <div v-show="!isMinimized && messages.length === 0" class="ai-suggestions">
        <div v-for="(suggestion, index) in suggestions" :key="index" 
             class="ai-suggestion-btn"
             @click="sendMessage(suggestion)">
            {{ suggestion }}
        </div>
    </div>
    
    <!-- 输入区域 -->
    <div v-show="!isMinimized" class="ai-chat-input">
        <input 
            v-model="inputMessage" 
            @keyup.enter="sendMessage()"
            placeholder="输入消息..."
            :disabled="isLoading">
        <button @click="sendMessage()" :disabled="isLoading || !inputMessage.trim()">
            <span class="material-symbols-outlined">send</span>
        </button>
    </div>
</div>

<script>
// AI助手组件逻辑
const aiAssistantComponent = {
    data() {
        return {
            showChat: false,
            isMinimized: false,
            messages: [],
            inputMessage: '',
            isLoading: false,
            sessionId: '',
            suggestions: [],
            // 拖动相关
            isDragging: false,
            dragStartX: 0,
            dragStartY: 0,
            buttonX: 0,
            buttonY: 0,
            isDraggingWindow: false,
            windowStartX: 0,
            windowStartY: 0,
            windowX: 0,
            windowY: 0
        }
    },
    mounted() {
        // 加载快捷建议
        this.loadSuggestions()
        
        // 生成或恢复会话ID
        this.sessionId = localStorage.getItem('ai_session_id') || this.generateSessionId()
        localStorage.setItem('ai_session_id', this.sessionId)
        
        // 加载历史消息
        this.loadHistory()
        
        // 添加全局鼠标事件监听
        document.addEventListener('mousemove', this.onDrag)
        document.addEventListener('mouseup', this.stopDrag)
    },
    beforeUnmount() {
        document.removeEventListener('mousemove', this.onDrag)
        document.removeEventListener('mouseup', this.stopDrag)
    },
    methods: {
        generateSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9)
        },
        
        async loadSuggestions() {
            try {
                const token = localStorage.getItem('token')
                const response = await fetch('http://localhost:5001/api/ai/suggestions', {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                const result = await response.json()
                if (result.success) {
                    this.suggestions = result.data
                }
            } catch (e) {
                console.error('加载建议失败:', e)
            }
        },
        
        async loadHistory() {
            try {
                const token = localStorage.getItem('token')
                const response = await fetch(`http://localhost:5001/api/ai/history?session_id=${this.sessionId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                const result = await response.json()
                if (result.success && result.data.length > 0) {
                    this.messages = result.data.map(msg => ({
                        role: msg.role,
                        content: msg.content,
                        time: new Date()
                    }))
                    this.$nextTick(() => {
                        this.scrollToBottom()
                    })
                }
            } catch (e) {
                console.error('加载历史失败:', e)
            }
        },
        
        async sendMessage(text) {
            const message = text || this.inputMessage.trim()
            if (!message || this.isLoading) return
            
            // 添加用户消息
            this.messages.push({
                role: 'user',
                content: message,
                time: new Date()
            })
            
            this.inputMessage = ''
            this.isLoading = true
            
            this.$nextTick(() => {
                this.scrollToBottom()
            })
            
            try {
                const token = localStorage.getItem('token')
                const response = await fetch('http://localhost:5001/api/ai/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: this.sessionId
                    })
                })
                
                const result = await response.json()
                
                if (result.success) {
                    // 添加AI回复
                    this.messages.push({
                        role: 'assistant',
                        content: result.data.reply,
                        time: new Date()
                    })
                    
                    this.$nextTick(() => {
                        this.scrollToBottom()
                    })
                } else {
                    throw new Error(result.message)
                }
            } catch (e) {
                console.error('发送消息失败:', e)
                this.messages.push({
                    role: 'assistant',
                    content: '抱歉，我遇到了一些问题。请稍后再试。',
                    time: new Date()
                })
            } finally {
                this.isLoading = false
            }
        },
        
        formatMessage(content) {
            // 简单的Markdown格式化
            return content
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
        },
        
        formatTime(time) {
            const now = new Date()
            const diff = now - time
            
            if (diff < 60000) return '刚刚'
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前'
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前'
            
            return time.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
        },
        
        scrollToBottom() {
            if (this.$refs.messagesContainer) {
                this.$refs.messagesContainer.scrollTop = this.$refs.messagesContainer.scrollHeight
            }
        },
        
        toggleChat() {
            if (!this.isDragging) {
                this.showChat = !this.showChat
                if (this.showChat) {
                    this.$nextTick(() => {
                        this.scrollToBottom()
                    })
                }
            }
        },
        
        closeChat() {
            this.showChat = false
        },
        
        // 拖动按钮
        startDrag(e) {
            this.isDragging = true
            this.dragStartX = e.clientX - this.buttonX
            this.dragStartY = e.clientY - this.buttonY
            e.target.classList.add('dragging')
        },
        
        onDrag(e) {
            if (this.isDragging) {
                e.preventDefault()
                this.buttonX = e.clientX - this.dragStartX
                this.buttonY = e.clientY - this.dragStartY
                
                const button = document.getElementById('aiFloatButton')
                if (button) {
                    button.style.right = 'auto'
                    button.style.bottom = 'auto'
                    button.style.left = this.buttonX + 'px'
                    button.style.top = this.buttonY + 'px'
                }
            }
            
            if (this.isDraggingWindow) {
                e.preventDefault()
                this.windowX = e.clientX - this.windowStartX
                this.windowY = e.clientY - this.windowStartY
                
                const window = document.querySelector('.ai-chat-window')
                if (window) {
                    window.style.right = 'auto'
                    window.style.bottom = 'auto'
                    window.style.left = this.windowX + 'px'
                    window.style.top = this.windowY + 'px'
                }
            }
        },
        
        stopDrag(e) {
            if (this.isDragging) {
                this.isDragging = false
                const button = document.getElementById('aiFloatButton')
                if (button) {
                    button.classList.remove('dragging')
                }
            }
            this.isDraggingWindow = false
        },
        
        // 拖动窗口
        startDragWindow(e) {
            this.isDraggingWindow = true
            const window = document.querySelector('.ai-chat-window')
            const rect = window.getBoundingClientRect()
            this.windowStartX = e.clientX - rect.left
            this.windowStartY = e.clientY - rect.top
        }
    }
}
</script>
