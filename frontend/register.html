<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script>if(localStorage.getItem('theme')!=='light')document.documentElement.classList.add('dark')</script>
    <title>抖音电商热点数据可视化分析系统 - 注册</title>
    <link href="css/fonts.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="js/toast.js"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13c8ec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101f22",
                        "surface-dark": "#16282b",
                        "input-bg": "#192f33",
                        "input-border": "#325e67",
                        "text-secondary": "#92c0c9"
                    },
                    fontFamily: {
                        "display": ["Inter", "Noto Sans SC", "sans-serif"],
                        "sans": ["Inter", "Noto Sans SC", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
        
        /* 背景动画 */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .float-animation {
            animation: float 6s ease-in-out infinite;
        }
        
        /* 渐变边框效果 */
        .gradient-border {
            position: relative;
            background: linear-gradient(135deg, rgba(19, 200, 236, 0.1), rgba(19, 200, 236, 0.05));
            border: 1px solid transparent;
        }
        
        .gradient-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, #13c8ec, #325e67);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
            pointer-events: none;
        }
        
        /* 输入框聚焦效果 */
        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(19, 200, 236, 0.1), 0 0 20px rgba(19, 200, 236, 0.2);
        }
        
        /* 按钮脉冲效果 */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(19, 200, 236, 0.3); }
            50% { box-shadow: 0 0 30px rgba(19, 200, 236, 0.6); }
        }
        
        .btn-pulse:hover {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        /* 亮色模式覆盖 */
        html:not(.dark) .bg-surface-dark { background-color: #ffffff !important; }
        html:not(.dark) .bg-input-bg { background-color: #f3f4f6 !important; }
        html:not(.dark) .border-input-border { border-color: #e5e7eb !important; }
        html:not(.dark) .text-text-secondary { color: #6b7280 !important; }
        html:not(.dark) .bg-background-dark { background-color: #f9fafb !important; }
        html:not(.dark) .from-white { --tw-gradient-from: #0d191b !important; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-sans text-slate-900 dark:text-white antialiased min-h-screen flex flex-col">

<div id="app">
    <div class="relative flex min-h-screen w-full flex-col justify-center overflow-hidden py-6 sm:py-12">
        <!-- 背景 -->
        <div class="absolute inset-0 w-full h-full bg-[url('https://images.unsplash.com/photo-1639322537228-f710d846310a?q=80&w=2832&auto=format&fit=crop')] bg-cover bg-center opacity-10 pointer-events-none"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-background-light via-background-light/95 to-background-light/80 dark:from-background-dark dark:via-background-dark/95 dark:to-background-dark/80 pointer-events-none"></div>
        
        <div class="relative w-full max-w-md mx-auto px-4">
            <!-- 装饰性浮动元素 -->
            <div class="absolute -top-20 -left-20 w-40 h-40 bg-primary/10 rounded-full blur-3xl float-animation"></div>
            <div class="absolute -bottom-20 -right-20 w-40 h-40 bg-primary/10 rounded-full blur-3xl float-animation" style="animation-delay: 3s;"></div>
            
            <div class="gradient-border bg-surface-dark rounded-2xl p-8 shadow-[0_20px_50px_rgba(0,0,0,0.5)] backdrop-blur-sm">
                <!-- Logo -->
                <div class="flex items-center justify-center gap-3 mb-8">
                    <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-primary to-primary/60 flex items-center justify-center shadow-lg shadow-primary/30">
                        <span class="material-symbols-outlined text-white text-2xl">analytics</span>
                    </div>
                    <span class="font-bold text-2xl bg-gradient-to-r from-white to-text-secondary bg-clip-text text-transparent">数据分析系统</span>
                </div>
                
                <div class="mb-8 text-center">
                    <h3 class="text-3xl font-bold mb-3 bg-gradient-to-r from-white via-white to-text-secondary bg-clip-text text-transparent">创建账号</h3>
                    <p class="text-text-secondary text-sm">填写以下信息，开启数据分析之旅</p>
                </div>
                
                <form @submit.prevent="handleRegister" class="flex flex-col gap-4">
                    <!-- 错误/成功提示 -->
                    <transition name="fade">
                        <div v-if="message" :class="['p-3 rounded-lg text-sm', 
                            success ? 'bg-green-500/10 border border-green-500/30 text-green-400' 
                                    : 'bg-red-500/10 border border-red-500/30 text-red-400']">
                            {{ message }}
                        </div>
                    </transition>
                    
                    <!-- 用户名 -->
                    <label class="flex flex-col gap-2">
                        <span class="text-sm font-semibold flex items-center gap-1">
                            <span class="material-symbols-outlined text-base text-primary">person</span>
                            用户名
                            <span class="text-red-400">*</span>
                        </span>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-text-secondary group-focus-within:text-primary transition-colors">
                                <span class="material-symbols-outlined text-xl">account_circle</span>
                            </div>
                            <input v-model="form.username"
                                   class="input-glow w-full h-12 pl-11 pr-4 rounded-xl bg-input-bg border border-input-border text-white placeholder:text-[#5d7c85] focus:ring-0 focus:border-primary transition-all text-sm"
                                   placeholder="请输入用户名（3-20位）"
                                   type="text"
                                   maxlength="20"/>
                        </div>
                    </label>
                    
                    <!-- 昵称 -->
                    <label class="flex flex-col gap-2">
                        <span class="text-sm font-semibold flex items-center gap-1">
                            <span class="material-symbols-outlined text-base text-primary">badge</span>
                            昵称
                            <span class="text-xs text-text-secondary font-normal ml-1">(可选)</span>
                        </span>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-text-secondary group-focus-within:text-primary transition-colors">
                                <span class="material-symbols-outlined text-xl">badge</span>
                            </div>
                            <input v-model="form.nickname"
                                   class="input-glow w-full h-12 pl-11 pr-4 rounded-xl bg-input-bg border border-input-border text-white placeholder:text-[#5d7c85] focus:ring-0 focus:border-primary transition-all text-sm"
                                   placeholder="请输入昵称（可选）"
                                   type="text"
                                   maxlength="50"/>
                        </div>
                    </label>
                    
                    <!-- 密码 -->
                    <label class="flex flex-col gap-2">
                        <span class="text-sm font-semibold flex items-center gap-1">
                            <span class="material-symbols-outlined text-base text-primary">lock</span>
                            密码 
                            <span class="text-red-400">*</span>
                        </span>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-text-secondary group-focus-within:text-primary transition-colors">
                                <span class="material-symbols-outlined text-xl">lock</span>
                            </div>
                            <input v-model="form.password"
                                   :type="showPassword ? 'text' : 'password'"
                                   class="input-glow w-full h-12 pl-11 pr-11 rounded-xl bg-input-bg border border-input-border text-white placeholder:text-[#5d7c85] focus:ring-0 focus:border-primary transition-all text-sm"
                                   placeholder="请输入密码（至少6位）"
                                   maxlength="32"/>
                            <button @click="showPassword = !showPassword"
                                    class="absolute inset-y-0 right-0 flex items-center pr-4 text-text-secondary hover:text-primary transition-all hover:scale-110"
                                    type="button">
                                <span class="material-symbols-outlined text-xl">
                                    {{ showPassword ? 'visibility_off' : 'visibility' }}
                                </span>
                            </button>
                        </div>
                    </label>
                    
                    <!-- 确认密码 -->
                    <label class="flex flex-col gap-2">
                        <span class="text-sm font-semibold flex items-center gap-1">
                            <span class="material-symbols-outlined text-base text-primary">verified</span>
                            确认密码 
                            <span class="text-red-400">*</span>
                        </span>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-text-secondary group-focus-within:text-primary transition-colors">
                                <span class="material-symbols-outlined text-xl">lock_reset</span>
                            </div>
                            <input v-model="form.confirmPassword"
                                   :type="showPassword ? 'text' : 'password'"
                                   class="input-glow w-full h-12 pl-11 pr-4 rounded-xl bg-input-bg border border-input-border text-white placeholder:text-[#5d7c85] focus:ring-0 focus:border-primary transition-all text-sm"
                                   placeholder="请再次输入密码"/>
                        </div>
                    </label>
                    
                    <!-- 注册按钮 -->
                    <button :disabled="loading"
                            class="mt-2 flex w-full items-center justify-center rounded-lg bg-primary h-12 px-6 text-background-dark text-base font-bold hover:bg-[#0ebacb] active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(19,200,236,0.3)] hover:shadow-[0_0_25px_rgba(19,200,236,0.5)] disabled:opacity-50 disabled:cursor-not-allowed"
                            type="submit">
                        <span v-if="loading" class="material-symbols-outlined animate-spin mr-2">progress_activity</span>
                        {{ loading ? '注册中...' : '立即注册' }}
                    </button>
                    
                    <!-- 登录链接 -->
                    <div class="mt-2 text-center">
                        <p class="text-sm text-text-secondary">
                            已有账号? 
                            <a class="font-medium text-primary hover:text-primary/80 transition-colors ml-1" href="login.html">立即登录</a>
                        </p>
                    </div>
                </form>
                
                <!-- 底部版权 -->
                <div class="mt-8 text-center">
                    <p class="text-xs text-slate-600">© 2024 Douyin E-commerce Analysis System</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp, ref, reactive } = Vue

const API_BASE = 'http://localhost:5001/api'

createApp({
    setup() {
        const form = reactive({
            username: '',
            nickname: '',
            password: '',
            confirmPassword: ''
        })
        
        const loading = ref(false)
        const message = ref('')
        const success = ref(false)
        const showPassword = ref(false)
        
        const handleRegister = async () => {
            message.value = ''
            success.value = false
            
            // 表单验证
            if (!form.username.trim()) {
                Toast.warning('请输入用户名')
                return
            }
            if (form.username.length < 3) {
                Toast.warning('用户名至少 3 个字符')
                return
            }
            if (!form.password) {
                Toast.warning('请输入密码')
                return
            }
            if (form.password.length < 6) {
                Toast.warning('密码至少 6 位')
                return
            }
            if (form.password !== form.confirmPassword) {
                Toast.error('两次密码输入不一致')
                return
            }
            
            loading.value = true
            
            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: form.username.trim(),
                        password: form.password,
                        nickname: form.nickname.trim() || form.username.trim()
                    })
                })
                
                const result = await response.json()
                
                if (result.success) {
                    Toast.success('注册成功，3 秒后跳转到登录页...')
                    
                    setTimeout(() => {
                        window.location.href = 'login.html'
                    }, 3000)
                } else {
                    Toast.error(result.message || '注册失败')
                }
            } catch (e) {
                console.error('Register error:', e)
                Toast.error('网络错误，请检查后端服务')
            } finally {
                loading.value = false
            }
        }
        
        return {
            form,
            loading,
            message,
            success,
            showPassword,
            handleRegister
        }
    }
}).mount('#app')
</script>

</body>
</html>
